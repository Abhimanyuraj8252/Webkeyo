<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Premium Dark Gradient Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="w" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#E11D48" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)" />

  <!-- "W" for Webkeyo -->
  <path d="M 220,300 L 350,750 L 512,500 L 674,750 L 804,300" 
        fill="none" 
        stroke="url(#w)" 
        stroke-width="70" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#glow)" />

  <!-- Play Button / Camera Reel -->
  <polygon points="460,350 460,450 560,400" 
           fill="url(#play)" 
           filter="url(#glow)"/>
</svg>
